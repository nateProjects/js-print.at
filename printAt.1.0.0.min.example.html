<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>print.At 1.0.0 example</title>
	<script src="printAt.1.0.0.min.js"></script>
	<style>
		body { font-family: sans-serif; margin: 16px; background: #f4f4f4; color: #222; }
		h1 { margin: 0 0 4px 0; font-size: 18px; }
		p.lead { margin: 0 0 12px 0; color: #555; font-size: 13px; }
		#stage { position: relative; min-height: 480px; }
		#screenCanvas { position: static !important; display: block; margin: 0 0 16px 0; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
		.panels { display: flex; flex-wrap: wrap; gap: 16px; }
		.panel { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; min-width: 180px; }
		.panel h2 { font-size: 13px; margin: 0 0 6px 0; color: #444; text-transform: uppercase; letter-spacing: 0.5px; }
		.row { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; align-items: center; }
		button { font: 12px/1 sans-serif; padding: 4px 8px; border: 1px solid #bbb; border-radius: 4px; background: #fafafa; cursor: pointer; }
		button:hover { background: #eee; }
		button.swatch { width: 20px; height: 20px; padding: 0; border: 1px solid #888; }
		label { font-size: 12px; color: #555; }
		select, input[type="number"] { font: 12px sans-serif; padding: 2px 4px; border: 1px solid #bbb; border-radius: 3px; }
	</style>
</head>
<body>
	<h1>print.At 1.0.0 demo</h1>
	<p class="lead">Click the controls below to change palette, screen paper, border, grid and scale. Each change redraws the canvas.</p>

	<div id="stage"></div>

	<div class="panels">
		<div class="panel">
			<h2>Palette / preset</h2>
			<div class="row">
				<select id="paletteSel">
					<option value="spectrum">ZX Spectrum</option>
					<option value="c64">Commodore 64</option>
					<option value="cga">CGA</option>
					<option value="bbc">BBC Micro</option>
					<option value="msx">MSX</option>
					<option value="cpc">Amstrad CPC</option>
				</select>
				<button id="applyPreset">Use preset resolution</button>
			</div>
		</div>

		<div class="panel">
			<h2>Screen paper</h2>
			<div class="row" id="paperSwatches"></div>
		</div>

		<div class="panel">
			<h2>Border</h2>
			<div class="row">
				<label>thickness <input type="number" id="borderThick" value="0" min="0" max="32" step="1" style="width:50px"></label>
			</div>
			<div class="row" id="borderSwatches"></div>
		</div>

		<div class="panel">
			<h2>Grid</h2>
			<div class="row">
				<button id="gridToggle">Toggle grid</button>
			</div>
			<div class="row" id="gridSwatches"></div>
		</div>

		<div class="panel">
			<h2>Scale</h2>
			<div class="row">
				<button data-scale="1">1x</button>
				<button data-scale="2">2x</button>
				<button data-scale="3">3x</button>
				<button data-scale="4">4x</button>
			</div>
		</div>
	</div>

	<script>
		var screen = pbasic.screen, print = pbasic.print;

		// Initial setup
		screen.palette('spectrum');
		screen.size('spectrum');

		function repaintScene() {
			screen.clear();
			print.color(0, 7);
			print.at(1, 1,  "print.At 1.0.0");
			print.at(1, 2,  "palette: " + screen.palette().name);
			print.at(1, 3,  "size: " + screen.cols + "x" + screen.rows +
			              " (" + screen.nativeWidth + "x" + screen.nativeHeight + ")");
			print.at(1, 4,  "scale: " + screen.scale() +
			              "  buffer: " + screen.canvas.width + "x" + screen.canvas.height);

			print.color(2, 6); print.at(1, 6,  " ink 2 on paper 6 ");
			print.color(1, 7); print.at(1, 7,  " ink 1 on paper 7 ");
			print.color(4, 0); print.at(1, 8,  " ink 4 on paper 0 ");

			print.color(0, 7);
			print.at(1, 10, "print.line wraps:");
			print.line(" -> like this");
			print.line("    -> and this");
		}

		// Move canvas into #stage so it sits where we want it on the page.
		var stage = document.getElementById('stage');
		stage.appendChild(screen.canvas);

		repaintScene();

		// --- helpers --------------------------------------------------------
		function buildSwatches(containerId, onPick) {
			var c = document.getElementById(containerId);
			c.innerHTML = '';
			var p = screen.palette();
			for (var i = 0; i < p.colors.length; i++) {
				var b = document.createElement('button');
				b.className = 'swatch';
				b.style.background = p.colors[i];
				b.title = i + ': ' + p.colors[i];
				(function (idx) { b.onclick = function () { onPick(idx); }; }(i));
				c.appendChild(b);
			}
		}

		// Re-bind grid swatches with the up-to-date palette each time.
		function bindGridSwatches() {
			var c = document.getElementById('gridSwatches');
			c.innerHTML = '';
			var p = screen.palette();
			for (var i = 0; i < p.colors.length; i++) {
				var b = document.createElement('button');
				b.className = 'swatch';
				b.style.background = p.colors[i];
				b.title = i + ': ' + p.colors[i];
				(function (color) {
					b.onclick = function () { screen.grid(true, color); };
				}(p.colors[i]));
				c.appendChild(b);
			}
		}

		function rebuildSwatches() {
			buildSwatches('paperSwatches',  function (i) { screen.cls(undefined, i); repaintScene(); });
			buildSwatches('borderSwatches', function (i) { screen.border(i); });
			bindGridSwatches();
		}

		rebuildSwatches();

		// --- palette / preset ----------------------------------------------
		document.getElementById('paletteSel').onchange = function () {
			screen.palette(this.value);
			rebuildSwatches();
			repaintScene();
		};
		document.getElementById('applyPreset').onclick = function () {
			var name = document.getElementById('paletteSel').value;
			screen.palette(name);
			screen.size(name);
			rebuildSwatches();
			repaintScene();
		};

		// --- border thickness ----------------------------------------------
		document.getElementById('borderThick').oninput = function () {
			var t = parseInt(this.value, 10) || 0;
			screen.border(undefined, t);
			repaintScene();
		};

		// --- grid toggle ---------------------------------------------------
		document.getElementById('gridToggle').onclick = function () {
			var on = screen.grid();
			if (!on) { repaintScene(); }   // when turning off, clear lines via repaint
		};

		// --- scale ---------------------------------------------------------
		var scaleBtns = document.querySelectorAll('button[data-scale]');
		for (var i = 0; i < scaleBtns.length; i++) {
			scaleBtns[i].onclick = function () {
				screen.scale(parseInt(this.getAttribute('data-scale'), 10));
				repaintScene();
			};
		}
	</script>
</body>
</html>
